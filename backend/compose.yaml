services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ai_ops_local
      POSTGRES_USER: ai_ops_local
      POSTGRES_PASSWORD: ai_ops_local_password
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_ops_local -d ai_ops_local"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - ai_ops_postgres_data:/var/lib/postgresql/data

volumes:
  ai_ops_postgres_data:
